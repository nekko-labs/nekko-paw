name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      # Build every workspace first: the cloud test suite imports @open-paw/host,
      # and @open-paw/server imports @open-paw/cli, so their dists must exist
      # before `npm test` / typecheck run.
      - run: npm run build:web
      - run: npm test
      - run: npm run typecheck
